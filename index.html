<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRC Pavement Calculator</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
        }

        .home-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            border-style: groove;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
        }

        .home-btn {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            border-style: double;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
        }

        .home-btn:hover {
            background-color: #0056b3;
        }

    </style>

</head>

<body>

    <h1>IRC Pavement Calculator</h1>

    <div class="home-container">

        <button class="home-btn"
            onclick="window.location.href='fatigue.html'">
            Fatigue / Rutting Calculator
        </button>

        <button class="home-btn"
            onclick="window.location.href='life.html'">
            Pavement Life Calculator
        </button>

    </div>

</body>

</html>
